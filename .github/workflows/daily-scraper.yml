# Daily Job Scraper — runs in GitHub Actions cloud (free)
# Scrapes jobs from all sources, updates jobs.db, and commits back to repo.
#
# Schedule: Every day at 00:30 UTC (6:00 AM IST)
# Can also be triggered manually from GitHub Actions tab.

name: Daily Job Scraper

on:
  schedule:
    # 00:30 UTC = 06:00 AM IST
    - cron: '30 0 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write   # Allow git push of updated jobs.db

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install python-dotenv selectolax httpx aiohttp rapidfuzz google-generativeai libsql-client

      - name: Run scrapers
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          THEIRSTACK_KEY: ${{ secrets.THEIRSTACK_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          python scheduler.py --run-once

      - name: Show DB stats
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          python -c "
          from database.db import get_conn
          with get_conn() as conn:
              res = conn.execute('SELECT COUNT(*) as total FROM jobs')
              total = res[0]['total']
              res = conn.execute('SELECT COUNT(*) as active FROM jobs WHERE is_active=1')
              active = res[0]['active']
              print(f'Total: {total} | Active: {active}')
          "
