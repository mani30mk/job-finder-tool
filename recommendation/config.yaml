# JobHunter Advanced Configuration

# Database (resolved automatically if empty)
db_path: ""
cache_path: ".jobhunter_cache.db"

# Semantic matching (using TF-IDF — no heavy dependencies)
embedding_model: "tfidf"
similarity_threshold: 0.65
use_semantic_matching: true

# LLM Parsing (set api_key to enable)
llm_provider: "openai"
llm_model: "gpt-3.5-turbo"
llm_api_key: ""
use_llm_parsing: false

# Web search (disabled by default)
enable_web_search: false
search_sources:
  - linkedin
  - indeed
max_web_jobs: 50

# Deduplication
dedup_threshold: 0.85

# Scoring weights (dynamically adjusted per profile)
base_weights:
  skills: 0.35
  title: 0.20
  experience: 0.15
  location: 0.10
  salary: 0.10
  type: 0.10

# Output defaults
default_limit: 20
default_min_score: 0.1
